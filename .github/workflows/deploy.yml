# ============================================================
# CI/CD Pipeline — Build, Lint & Deploy to Vercel
# ============================================================
# Triggers on pushes and PRs to main, staging, and develop.
# Deploys production on main; preview on all other branches.

name: Deploy to Vercel

on:
  push:
    branches: [main, staging, develop]
  pull_request:
    branches: [main]

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # ── Checkout ──
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Node.js ──
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # ── Install ──
      - name: Install dependencies
        run: npm ci

      # ── Type check ──
      - name: TypeScript type check
        run: npx tsc --noEmit --skipLibCheck

      # ── Build ──
      - name: Build production bundle
        run: npm run build

      # ── Upload build artifacts ──
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7

      # ── Install Vercel CLI ──
      - name: Install Vercel CLI
        run: npm install -g vercel

      # ── Deploy Preview (non-main branches) ──
      - name: Deploy Preview to Vercel
        if: github.ref != 'refs/heads/main'
        run: |
          vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --token=${{ secrets.VERCEL_TOKEN }}
          vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}

      # ── Deploy Production (main branch only) ──
      - name: Deploy Production to Vercel
        if: github.ref == 'refs/heads/main'
        run: |
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
